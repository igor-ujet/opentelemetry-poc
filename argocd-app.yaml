apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: collector
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/igor-ujet/opentelemetry-poc.git
    targetRevision: main
    path: collector

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
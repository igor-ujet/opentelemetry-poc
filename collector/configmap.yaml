apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317   # ← corrigido de 127.0.0.1
          http:
            endpoint: 0.0.0.0:4318   # ← corrigido de 127.0.0.1

    processors:
      batch:

    exporters:
      debug:
        verbosity: detailed
      otlp/signoz:                    # ← novo exporter
        endpoint: host.docker.internal:4317
        tls:
          insecure: true
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, otlp/signoz]  # ← adicionado signoz